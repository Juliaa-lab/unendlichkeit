
<!DOCTYPE>
<html>
<head>
<title>Unendlichkeit</title>
<style>
body {
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
height: 100vh
margin: 0;
font-family: Arial, sans-serif;
}
.loader {
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
}
.loader-circle {
border: 6px solid #e0e0e0;
border-top: 6px solid #000000;
border-radius: 50%;
width: 150px;
height: 150px;
animation: spin 2s linear infinite;
}
.loader-text {
margin-top: 16px;
font-size: 14px;
color: black;
text-alingn: center;
}
@keyframes spin {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="loader">
<div class="loader-circle"></div>
<div class="text">still loading...</div>
</div>
</body>
</html>
